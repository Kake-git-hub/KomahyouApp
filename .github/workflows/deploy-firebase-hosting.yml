name: Deploy to Firebase Hosting

# main への push で本番(komahyouapp-prod)の Firebase Hosting に自動デプロイする。
# ローカルの `npm run deploy:firebase` と同じ流れ（bump → build → deploy → ライブ検証）を
# GitHub のランナー上で実行するため、スマホからでも main にマージするだけで反映できる。
#
# 必要な設定（リポジトリ Settings → Secrets and variables → Actions → New repository secret）:
#   RE_FIREBASE_SERVICE_ACCOUNT … Firebase コンソールで発行したサービスアカウントの JSON 全文
#   FIREBASE_WEB_ENV            … フロントの .env.local の中身(VITE_FIREBASE_* など)全文
#
# デプロイのたびに package.json の patch バージョンを1つ上げてコミットを main に戻す。
# この戻しコミットは GITHUB_TOKEN による push なのでワークフローを再発火させず無限ループしない。
#
# 注意: Firestore ルールは安全のためこの自動デプロイの対象外（hosting のみ）。
# ルール変更を反映したいときは別途 `firebase deploy --only firestore` を実行すること。

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: firebase-hosting-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump patch version
        run: node tools/bump-version.mjs

      # フロントの Firebase 接続設定はビルド時に VITE_FIREBASE_* から焼き込まれる。
      # 手元の .env.local は CI に無いため、Secret から復元する。未設定/不足のまま
      # ビルドすると "local モード"(Firebase 非接続)のアプリが本番に出てしまうため、
      # 必須値が無ければここで fail-closed させ、本番には一切デプロイしない。
      - name: Write frontend build env from secret
        run: |
          printf '%s\n' "$FIREBASE_WEB_ENV" > .env.production.local
          node -e '
            const fs = require("fs");
            const txt = fs.existsSync(".env.production.local") ? fs.readFileSync(".env.production.local", "utf8") : "";
            const env = Object.fromEntries(
              txt.split(/\r?\n/).filter((l) => l && !l.startsWith("#")).map((l) => {
                const i = l.indexOf("=");
                return [l.slice(0, i).trim(), l.slice(i + 1).trim()];
              }),
            );
            const required = ["VITE_FIREBASE_API_KEY", "VITE_FIREBASE_AUTH_DOMAIN", "VITE_FIREBASE_PROJECT_ID", "VITE_FIREBASE_APP_ID", "VITE_FIREBASE_WORKSPACE_KEY"];
            const missing = required.filter((k) => !env[k]);
            if ((env.VITE_EXTERNAL_BACKEND_MODE || "").toLowerCase() === "local") {
              throw new Error("VITE_EXTERNAL_BACKEND_MODE=local では本番が Firebase に接続しません。GitHub secret FIREBASE_WEB_ENV を修正してください。");
            }
            if (missing.length) {
              throw new Error("Firebase 設定が不足しています: " + missing.join(", ") + "（GitHub secret FIREBASE_WEB_ENV を確認）");
            }
            console.log("frontend env OK: firebase project=" + env.VITE_FIREBASE_PROJECT_ID);
          '
        env:
          FIREBASE_WEB_ENV: ${{ secrets.FIREBASE_WEB_ENV }}

      - name: Build app
        # Firebase Hosting はルート(/)配信。FIREBASE_DEPLOY=1 で vite の base を '/' に固定する
        # (未設定だと GitHub Actions 上では GitHub Pages 用 base /<repo>/ になり本番が真っ白になる)。
        run: npm run build
        env:
          FIREBASE_DEPLOY: '1'

      - name: Write Firebase service account credentials
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.RE_FIREBASE_SERVICE_ACCOUNT }}

      # 本番を真っ白にしないための安全策(fail-closed):
      # 1) まずプレビューチャンネルへデプロイし、そのURLに対して資産実体まで検証する。
      #    ビルドが壊れている(チャンク欠落で HTML が返る等)とここで失敗し、本番には一切触れない。
      # 2) 検証に通った場合のみ本番(live)へ昇格デプロイし、本番URLも同じ強度で再検証する。
      - name: Deploy to preview channel
        id: preview
        run: |
          npx --yes firebase-tools hosting:channel:deploy "verify-${GITHUB_RUN_ID}" \
            --project komahyouapp-prod --expires 2h --json --non-interactive > "$RUNNER_TEMP/channel.json"
          cat "$RUNNER_TEMP/channel.json"
          CHANNEL_URL="$(node -e "const j=require('$RUNNER_TEMP/channel.json'); const sites=j.result||{}; const first=Object.values(sites)[0]||{}; if(!first.url){throw new Error('no channel url')} process.stdout.write(first.url)")"
          echo "channel_url=$CHANNEL_URL" >> "$GITHUB_OUTPUT"
          echo "Preview channel: $CHANNEL_URL"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json

      - name: Verify preview channel (blocks bad builds before live)
        run: node tools/verify-firebase-hosting.mjs --site "${{ steps.preview.outputs.channel_url }}" --retries 20 --retryDelayMs 3000

      - name: Promote to live (only if preview verified)
        run: npx --yes firebase-tools deploy --project komahyouapp-prod --only hosting --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json

      - name: Verify live deployment
        run: node tools/verify-firebase-hosting.mjs --project komahyouapp-prod --retries 20 --retryDelayMs 3000

      - name: Commit version bump back to main
        run: |
          if git diff --quiet -- package.json; then
            echo "package.json に変更がないためコミットをスキップします。"
            exit 0
          fi
          NEXT_VERSION="$(node -p "require('./package.json').version")"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): v${NEXT_VERSION} デプロイに伴うバージョン更新"
          git push origin HEAD:main
