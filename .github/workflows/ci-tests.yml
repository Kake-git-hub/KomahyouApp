name: CI Tests

# 回帰防止のテストゲート。
#
# 【必須ゲート】push / PR ごとに `unit`(lint 非ブロッキング + 単体 + build) を回す。
#   約1分・決定的（402 件の単体テスト）。これが緑かどうかで main マージ可否を判断する。
# 【e2e は手動のみ】Playwright の e2e(local / Firebase エミュレータ)は workflow_dispatch のときだけ走る。
#   理由: 現状 e2e フルスイートは headless CI で 18 件が環境差(ポップアップ/休日/振替の타이밍)で
#   不安定 + 18 分かかり、毎 push の必須ゲートには不向き。安定化できたら push トリガに昇格する。
#   それまでは safe-release のリリース前チェックでローカル `npm run test:e2e` を回して担保する。
# 本番デプロイ（deploy-firebase-hosting.yml）とは独立。Firebase 認証情報は使わない。
#
# 任意: GitHub Settings → Branches で main を保護し `unit` を必須チェックにすると、
# 緑でないと main にマージできなくなる。

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Lint + Unit + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # lint 負債を解消済み(errors=0・warnings は許容)。以後はブロッキングにして再発を防ぐ。
      # 新規コードは error を増やさないこと(warning の exhaustive-deps/react-refresh は許容)。
      - name: Lint
        run: npm run lint
      - name: Unit tests (vitest)
        run: npm run test:unit
      - name: Build
        run: npm run build
        env:
          FIREBASE_DEPLOY: '1'

  e2e:
    name: E2E (local mode)
    # 手動実行(workflow_dispatch)時のみ。push/PR では走らせない（18分・要安定化のため）。
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Playwright e2e
        run: npm run test:e2e

  e2e-firebase:
    name: E2E (Firebase emulator)
    # 手動実行(workflow_dispatch)時のみ。
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Firestore エミュレータの実行に Java が必要。
      # firebase-tools のエミュレータは Java 21+ を要求する。
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      # demo-* プロジェクトは実認証なしでエミュレータが動く。auth/firestore を立てた中で e2e を実行。
      - name: Playwright e2e on emulator
        run: npx --yes firebase-tools emulators:exec --only auth,firestore --project demo-komahyou "npm run test:e2e:firebase"
