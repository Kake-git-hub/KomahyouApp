name: CI Tests

# 回帰防止のテストゲート。
#
# 【必須ゲート】push / PR ごとに `unit`(lint + 単体 + build) を回す。約1分・決定的。
#   これが緑かどうかで main マージ可否を判断する。
# 【Playwright E2E は廃止】2026-06-29 に E2E を廃止し、全シナリオをユニット(純粋関数)へ移植した。
#   方針と移植マップは docs/test-strategy.md。UI操作の回帰はユニットが、実環境の通し動作は
#   staging の手動確認が担保する。
# 【ルール分離テストは手動】Firestore セキュリティルールの分離検証(`npm run test:rules`)は
#   エミュレータ(+Java)が要るため workflow_dispatch のときだけ走る。安定・約数秒なので
#   リリース前 or 必要時に手動で回す(安定化後は push トリガへ昇格してよい)。
# 本番デプロイ（deploy-firebase-hosting.yml）とは独立。Firebase 認証情報は使わない。
#
# 任意: GitHub Settings → Branches で main を保護し `unit` を必須チェックにすると、
# 緑でないと main にマージできなくなる。

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Lint + Unit + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # lint 負債を解消済み(errors=0・warnings は許容)。以後はブロッキングにして再発を防ぐ。
      # 新規コードは error を増やさないこと(warning の exhaustive-deps/react-refresh は許容)。
      - name: Lint
        run: npm run lint
      - name: Unit tests (vitest)
        run: npm run test:unit
      - name: Build
        run: npm run build
      - name: Verify build base is root
        # 2026-06-25 本番真っ白障害の回帰ガード: base がサブパスに戻ると資産が /<repo>/assets/... になる。
        # デプロイ前(CI)に dist/index.html のルート相対資産を検証する(live 検証 verify-firebase-hosting.mjs の前段)。
        run: |
          grep -q 'src="/assets/' dist/index.html
          ! grep -q '/KomahyouApp/' dist/index.html

  inv-guard:
    name: INV改定ガード
    # マトリクステスト(*.matrix.test.ts / .tsx)を変更する差分は、同一 push 内で
    # docs/spec-invariants.md の改定(= INV 文言の改定はオーナー承認必須)を伴わなければ落とす。
    # INV の assert 薄化(格下げ)を台帳の追認なしに通さないためのガード。軽量・独立 job。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # 既定(fetch-depth:1)では差分が取れないので全履歴を取得する。
          fetch-depth: 0
      - name: matrix テスト変更に spec-invariants 改定が伴うか検査
        run: |
          set -euo pipefail
          ZERO="0000000000000000000000000000000000000000"
          BEFORE="${{ github.event.before }}"
          # push の before が全ゼロ(新ブランチ初 push)や取得不能なときは origin/main と比較。
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "$ZERO" ] || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            git fetch origin main --depth=1 || true
            BASE="$(git rev-parse origin/main 2>/dev/null || echo '')"
          else
            BASE="$BEFORE"
          fi
          if [ -z "$BASE" ]; then
            echo "比較基準が取得できないため INV改定ガードをスキップします"
            exit 0
          fi
          CHANGED="$(git diff --name-only "$BASE" HEAD)"
          MATRIX_CHANGED="$(echo "$CHANGED" | grep -E '\.matrix\.test\.(ts|tsx)$' || true)"
          SPEC_CHANGED="$(echo "$CHANGED" | grep -E '^docs/spec-invariants\.md$' || true)"
          if [ -n "$MATRIX_CHANGED" ] && [ -z "$SPEC_CHANGED" ]; then
            echo "INVマトリクステストの変更には docs/spec-invariants.md の改定(オーナー承認)を同一pushに含めてください"
            echo "--- 変更された matrix テスト ---"
            echo "$MATRIX_CHANGED"
            exit 1
          fi
          echo "INV改定ガード: OK"

  rules:
    name: Firestore rules isolation
    # 手動実行(workflow_dispatch)時のみ。エミュレータ(+Java)が要るため push/PR の必須ゲートには含めない。
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Firestore エミュレータの実行に Java 21+ が必要。
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm ci
      - name: Firestore rules tests (emulator)
        run: npm run test:rules
