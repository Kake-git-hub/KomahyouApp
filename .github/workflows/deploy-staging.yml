name: Deploy to Staging

# 専用 staging プロジェクト(komahyouapp-staging)へ hosting + functions + ルールをデプロイする。
# 本番(komahyouapp-prod)とは完全分離。Claude が本番に触れず実機検証するための環境。
# セットアップ手順: docs/runbooks/staging-setup.md
#
# 必要な GitHub Secrets(本番用とは別物):
#   STAGING_FIREBASE_WEB_ENV         … staging の .env.local 形式テキスト全文(VITE_FIREBASE_* など)
#   STAGING_FIREBASE_SERVICE_ACCOUNT … staging プロジェクトの SA JSON 全文
#   STAGING_STORAGE_BUCKET           … 例 komahyouapp-staging.firebasestorage.app
#                                       (未設定だと functions が本番バケットを参照する=クロス汚染)
#
# トリガー: 手動(workflow_dispatch)のみ。任意のブランチから実行可。
# 本番と違い patch bump はしない(staging は版管理対象外)。

on:
  workflow_dispatch:
    inputs:
      deploy_functions:
        description: 'Cloud Functions も staging にデプロイする'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: firebase-staging-deploy
  cancel-in-progress: false

env:
  STAGING_PROJECT_ID: komahyouapp-staging

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    env:
      # workflow_dispatch のときは入力値、push 起動のときは常に functions も含める。
      DEPLOY_FN: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_functions }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # staging 用 secret が未登録のまま走らせると無言で本番設定に化ける危険があるため、
      # 必須 secret が無ければここで fail-closed させる。
      - name: Guard required staging secrets
        run: |
          missing=""
          [ -z "$STAGING_FIREBASE_WEB_ENV" ] && missing="$missing STAGING_FIREBASE_WEB_ENV"
          [ -z "$STAGING_SA" ] && missing="$missing STAGING_FIREBASE_SERVICE_ACCOUNT"
          if [ -n "$missing" ]; then
            echo "staging 用 secret が未登録です:$missing"
            echo "docs/runbooks/staging-setup.md の手順7を完了してください。"
            exit 1
          fi
        env:
          STAGING_FIREBASE_WEB_ENV: ${{ secrets.STAGING_FIREBASE_WEB_ENV }}
          STAGING_SA: ${{ secrets.STAGING_FIREBASE_SERVICE_ACCOUNT }}

      # フロント接続設定を staging secret から復元し、本番に化けていないか検証する。
      - name: Write frontend build env from staging secret
        run: |
          printf '%s\n' "$STAGING_FIREBASE_WEB_ENV" > .env.production.local
          node -e '
            const fs = require("fs");
            const txt = fs.existsSync(".env.production.local") ? fs.readFileSync(".env.production.local", "utf8") : "";
            const env = Object.fromEntries(
              txt.split(/\r?\n/).filter((l) => l && !l.startsWith("#")).map((l) => {
                const i = l.indexOf("=");
                return [l.slice(0, i).trim(), l.slice(i + 1).trim()];
              }),
            );
            const required = ["VITE_FIREBASE_API_KEY", "VITE_FIREBASE_AUTH_DOMAIN", "VITE_FIREBASE_PROJECT_ID", "VITE_FIREBASE_APP_ID", "VITE_FIREBASE_WORKSPACE_KEY"];
            const missing = required.filter((k) => !env[k]);
            if ((env.VITE_EXTERNAL_BACKEND_MODE || "").toLowerCase() === "local") {
              throw new Error("VITE_EXTERNAL_BACKEND_MODE=local では Firebase に接続しません。STAGING_FIREBASE_WEB_ENV を修正してください。");
            }
            if (missing.length) {
              throw new Error("Firebase 設定が不足: " + missing.join(", "));
            }
            if (env.VITE_FIREBASE_PROJECT_ID === "komahyouapp-prod") {
              throw new Error("staging デプロイなのに projectId が本番(komahyouapp-prod)です。STAGING_FIREBASE_WEB_ENV を確認してください。");
            }
            console.log("staging frontend env OK: firebase project=" + env.VITE_FIREBASE_PROJECT_ID);
          '
        env:
          STAGING_FIREBASE_WEB_ENV: ${{ secrets.STAGING_FIREBASE_WEB_ENV }}

      - name: Build app
        run: npm run build
        env:
          FIREBASE_DEPLOY: '1'

      - name: Build functions
        if: ${{ env.DEPLOY_FN == 'true' }}
        run: npm --prefix functions ci && npm --prefix functions run build

      # functions を staging バケットに向ける。firebase-tools は functions/.env.<projectId> を
      # 自動で読み込むので、ここに STORAGE_BUCKET を書いておけば runtime env に焼き込まれる。
      - name: Write functions env for staging
        if: ${{ env.DEPLOY_FN == 'true' }}
        run: |
          BUCKET="${STAGING_STORAGE_BUCKET:-${STAGING_PROJECT_ID}.firebasestorage.app}"
          printf 'STORAGE_BUCKET=%s\n' "$BUCKET" > "functions/.env.${STAGING_PROJECT_ID}"
          echo "functions/.env.${STAGING_PROJECT_ID} -> STORAGE_BUCKET=$BUCKET"
        env:
          STAGING_STORAGE_BUCKET: ${{ secrets.STAGING_STORAGE_BUCKET }}

      - name: Write staging service account credentials
        run: |
          printf '%s' "$STAGING_SA" > "$RUNNER_TEMP/staging-sa.json"
        env:
          STAGING_SA: ${{ secrets.STAGING_FIREBASE_SERVICE_ACCOUNT }}

      # hosting と functions を別ステップに分ける。functions のデプロイ失敗(gen2 の 409 等)が
      # hosting の release を巻き込んで止めると「Site Not Found」になるため、hosting を先に
      # 独立して release・検証し、functions は後段の独立ステップにする。
      - name: Deploy hosting + rules to Staging
        run: |
          set +e
          npx --yes firebase-tools deploy --project "$STAGING_PROJECT_ID" --only hosting,firestore,storage --non-interactive \
            2>&1 | tee "$RUNNER_TEMP/deploy-hosting.log"
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            # 配信内容が現行ライブと同一だと firebase は 400 "is the current active version" を返す。
            # これは「既に同じ内容が公開済み」= 実質成功なので成功として続行する(本番 workflow と同じ扱い)。
            if grep -q "is the current active version" "$RUNNER_TEMP/deploy-hosting.log"; then
              echo "現行ライブと同一内容のため新規リリースはスキップされました(既に staging 反映済み)。成功として続行します。"
            else
              echo "staging hosting デプロイに失敗しました。"
              exit "$code"
            fi
          fi
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/staging-sa.json

      - name: Verify staging deployment (asset integrity)
        run: node tools/verify-firebase-hosting.mjs --project "$STAGING_PROJECT_ID" --retries 20 --retryDelayMs 3000

      - name: Deploy functions to Staging
        if: ${{ env.DEPLOY_FN == 'true' }}
        run: |
          set -o pipefail
          npx --yes firebase-tools deploy --project "$STAGING_PROJECT_ID" --only functions --non-interactive \
            2>&1 | tee "$RUNNER_TEMP/deploy-functions.log"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/staging-sa.json

      # gen2 functions は Cloud Run サービス。本番は invoker:'public'(公開呼び出し・認証は関数内で検証)。
      # 初回デプロイで公開 invoker が当たらないと callable/HTTP 関数が 403 になり保存やQRが失敗する。
      # ここで allUsers に run.invoker を明示付与して本番と同じ公開状態にする(staging のみ)。
      - name: Allow public invoke on function services
        if: ${{ env.DEPLOY_FN == 'true' }}
        run: |
          set -e
          gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS"
          gcloud config set project "$STAGING_PROJECT_ID" --quiet
          svcs=$(gcloud run services list --region=asia-northeast1 --format='value(metadata.name)')
          for svc in $svcs; do
            echo "granting allUsers run.invoker to $svc"
            gcloud run services add-iam-policy-binding "$svc" \
              --region=asia-northeast1 --member=allUsers --role=roles/run.invoker --quiet \
              || echo "WARN: $svc への付与に失敗(組織ポリシー等の可能性)"
          done
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/staging-sa.json
