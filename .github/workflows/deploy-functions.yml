name: Deploy Cloud Functions

# Cloud Functions(lectureSubmissionApi 等)を本番(komahyouapp-prod)へデプロイする。
# 既存の deploy-firebase-hosting.yml はホスティングのみ対象で functions を出さないため、
# functions 用のデプロイをここに分離する。GitHub のランナー上で実行するので、
# ローカルの Firebase 認証は不要(リポジトリ secret の RE_FIREBASE_SERVICE_ACCOUNT を使う)。
#
# 必要な設定(リポジトリ Settings → Secrets and variables → Actions):
#   RE_FIREBASE_SERVICE_ACCOUNT … サービスアカウント JSON 全文(ホスティングと共用)
#   ※ このサービスアカウントには Cloud Functions のデプロイ権限が必要:
#     Cloud Functions Admin / Service Account User / (初回は Cloud Build Editor・Artifact Registry 関連)。
#     権限不足の場合はこのワークフローが失敗するので、GCP コンソールでロールを付与すること。
#   PROD_FUNCTIONS_ENV … 本番 functions の runtime env(ローカル functions/.env と同じ内容の全文)。
#     GOOGLE_DRIVE_BACKUP_FOLDER_ID / GOOGLE_DRIVE_OAUTH_CLIENT_ID / GOOGLE_DRIVE_OAUTH_CLIENT_SECRET /
#     GOOGLE_DRIVE_OAUTH_REFRESH_TOKEN を含む(1行1キー)。firebase-tools が functions/.env.komahyouapp-prod を
#     読んで runtime env に焼き込む。**未設定だと Google Drive 自動同期が無効のままデプロイされる**
#     (functions/.env は .gitignore 済みで CI には来ないため。2026-07-10 の同期停止事故の恒久対策)。
#
# トリガー:
#   - 手動(workflow_dispatch): Actions タブから「Run workflow」で実行。
#   - main への push で functions/** が変わったとき: マージで自動デプロイ。

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      # staging 専用スクリプト(本番 functions には含まれない)は本番 functions デプロイを発火させない。
      - '!functions/scripts/**'
      - '.github/workflows/deploy-functions.yml'

permissions:
  contents: read

concurrency:
  group: firebase-functions-deploy
  cancel-in-progress: false

jobs:
  deploy-functions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: npm --prefix functions ci

      - name: Build functions
        run: npm --prefix functions run build

      # 本番 functions の runtime env(Google Drive バックアップの OAuth 等)を書き込む。
      # functions/.env は .gitignore 済み(秘密情報)なので CI のチェックアウトには含まれない。
      # firebase-tools は functions/.env.<projectId> を自動で読み込み runtime env に焼き込むため、
      # ここに本番用の env を書いておかないと GOOGLE_DRIVE_BACKUP_FOLDER_ID 等が空になり
      # Google Drive 自動同期が無効化される(2026-07-10 に CI デプロイで同期が止まった事故の恒久対策)。
      # シークレット PROD_FUNCTIONS_ENV = ローカル functions/.env と同じ内容(GOOGLE_DRIVE_* 一式)。
      - name: Write functions env for production
        run: |
          if [ -n "$PROD_FUNCTIONS_ENV" ]; then
            printf '%s\n' "$PROD_FUNCTIONS_ENV" > functions/.env.komahyouapp-prod
            echo "Wrote functions/.env.komahyouapp-prod ($(printf '%s' "$PROD_FUNCTIONS_ENV" | grep -c '=') keys)"
          else
            echo "::warning::PROD_FUNCTIONS_ENV secret が未設定です。GOOGLE_DRIVE_* が空になり Google Drive 自動同期は無効のままデプロイされます。"
          fi
        env:
          PROD_FUNCTIONS_ENV: ${{ secrets.PROD_FUNCTIONS_ENV }}

      - name: Write Firebase service account credentials
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.RE_FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Cloud Functions (live)
        # firebase の終了コードをそのままステップの成否にする(以前は `| tee` が exit code を
        # マスクして失敗を success と誤報告していた)。ログは tee + pipefail で保存する。
        #
        # --force について(2026-07-04): --non-interactive のみだと「ソースから削除された関数」を
        # 消せずデプロイ自体が失敗する(削除確認プロンプトに答えられないため)。--force で
        # 「ソースに無い関数は本番からも削除」を自動承認する。＝ main のソースが本番関数の正。
        # 運用ルール: 関数エクスポートの削除は本番から関数が消える操作なので、
        # オーナー承認を得たマージのみ main に入れること(仕様監査 領域2 補足の運用)。
        run: |
          set -o pipefail
          npx --yes firebase-tools deploy --project komahyouapp-prod --only functions --non-interactive --force \
            2>&1 | tee "$RUNNER_TEMP/deploy-functions.log"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
